<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .container h1 {
            margin-bottom: 24px;
            font-size: 24px;
            color: #333;
        }

        .container .button {
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        .start-button {
            background-color: #28a745;
            color: white;
        }

        .start-button:hover {
            background-color: #218838;
        }

        .instructor-button {
            background-color: #6c757d;
            color: white;
        }

        .instructor-button:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome, {{ username }}</h1>
        <p>Please choose an option:</p>
        <form action="/start-tutor" method="post">
            <button type="submit" class="button start-button">Start AI Tutor</button>
        </form>
        {% if role == "instructor" %}
        <form action="/start-instructor" method="post">
            <button type="submit" class="button instructor-button">Start Instructor Version</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
