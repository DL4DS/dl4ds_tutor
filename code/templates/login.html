<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .container h1 {
            margin-bottom: 24px;
            font-size: 24px;
            color: #333;
        }

        .container form {
            display: flex;
            flex-direction: column;
        }

        .container .button {
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        .guest-button {
            background-color: #007bff;
            color: white;
        }

        .guest-button:hover {
            background-color: #0056b3;
        }

        .google-button {
            background-color: #db4437;
            color: white;
        }

        .google-button:hover {
            background-color: #c23321;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <form action="/login/guest" method="post">
            <button type="submit" class="button guest-button">Sign in as Guest</button>
        </form>
        <form action="/login/google" method="get">
            <button type="submit" class="button google-button">Sign in with Google</button>
        </form>
    </div>
</body>
</html>
