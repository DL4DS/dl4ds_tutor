<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
        }

        .container h1 {
            margin-bottom: 24px;
            font-size: 24px;
            color: #333;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .button-container button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .guest-button {
            background-color: #6c757d;
            color: white;
        }

        .guest-button:hover {
            background-color: #5a6268;
        }

        .google-button {
            background-color: #4285f4;
            color: white;
        }

        .google-button:hover {
            background-color: #357ae8;
        }

        .google-button img {
            width: 20px;
            height: 20px;
        }

        .loading-container {
            display: none;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 10;
        }

        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <div class="button-container">
            <button class="guest-button" onclick="signInAsGuest()">Sign in as Guest</button>
            <button class="google-button" onclick="signInWithGoogle()">
                <img src="https://img.icons8.com/color/452/google-logo.png" alt="Google Logo">
                Sign in with Google
            </button>
        </div>
        <div class="loading-container" id="loading-container">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script>
        function showLoadingSpinner() {
            document.getElementById('loading-container').style.display = 'flex';
        }

        function signInAsGuest() {
            showLoadingSpinner();
            // Redirect or handle guest sign-in
            window.location.href = "/guest-signin";
        }

        function signInWithGoogle() {
            showLoadingSpinner();
            // Handle Google Sign-In, this is just a placeholder
            window.location.href = "/auth/google";
        }
    </script>
</body>
</html>
